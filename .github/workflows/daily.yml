name: BTC Power Signal

on:
  push:                         # deploy immediately on push (GitHub's cron is throttled/unreliable)
    branches: [main]
    paths-ignore:
      - state.json              # the bot's own state commits use [skip ci]; ignore them too
  schedule:
    - cron: "0 * * * *"        # hourly fallback: daily entry decision + intraday trailing-stop watch
  workflow_dispatch:

permissions:
  contents: write              # to persist state.json
  pages: write
  id-token: write

concurrency:
  group: btc-power
  cancel-in-progress: false

jobs:
  signal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Refresh data + signal + dashboard
        working-directory: src
        run: |
          python fetch_data.py
          python growth_engine.py
          python build_live_dashboard.py
      - name: Telegram watch (entry / exit / stop / daily report)
        working-directory: src
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
        run: python telegram_signal.py --mode watch
      - name: Persist position state
        run: |
          git config user.name "btc-power-bot"
          git config user.email "btc-power-bot@users.noreply.github.com"
          git add state.json || true
          git commit -m "update position state [skip ci]" || echo "no state change"
          git push || echo "nothing to push"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy-pages:
    needs: signal
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
